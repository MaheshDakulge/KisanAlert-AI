name: kisanalert_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  http: ^1.6.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  url_launcher: ^6.3.2
  speech_to_text: ^6.6.2
  path: any
  # Firebase — FCM push notifications + real-time auto-refresh
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  # Google Maps SDK — Mandi Map real map view
  google_maps_flutter: ^2.9.0
  # Location — user's live GPS position on the map
  geolocator: ^13.0.2
  permission_handler: ^11.4.0
  record: ^6.2.0
  record_web: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.jpg
