# KisanAlert — Daily ML Pipeline (Auto-Scheduler)
# Runs every day at 8:00 AM IST and 6:00 PM IST (02:30 and 12:30 UTC)
# Fetches latest mandi data → runs ML prediction → pushes alert to Supabase

name: Daily Price Pipeline

on:
  schedule:
    - cron: '30 2,12 * * *'   # 08:00 AM IST and 06:00 PM IST, every day
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    name: Run KisanAlert Pipeline (${{ matrix.crop }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crop: [Soybean, Cotton, Turmeric]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r Agri/requirements.txt
          pip install -r Agri/kisanalert/requirements.txt

      - name: Run Daily Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATAGOV_API_KEY: ${{ secrets.DATAGOV_API_KEY }}
          FIREBASE_ADMIN_SDK_JSON: ${{ secrets.FIREBASE_ADMIN_SDK_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: |
          cd Agri
          python run_pipeline.py --crop ${{ matrix.crop }}

      - name: Upload Pipeline Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ matrix.crop }}-${{ github.run_number }}
          path: Agri/logs/
          retention-days: 7
