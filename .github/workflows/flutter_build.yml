name: Flutter Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.11.1'
          channel: 'stable'

      - name: Get Dependencies
        run: |
          cd kisanalert_app
          flutter pub get

      - name: Build Release APK
        run: |
          cd kisanalert_app
          flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KisanAlert-Latest-APK
          path: kisanalert_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
